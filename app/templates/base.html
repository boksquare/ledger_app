<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ledger{% endblock %}</title>
  <script>
    // Apply saved theme before CSS paints to avoid a light-mode flash.
    document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
  </script>
  <link rel="stylesheet" href="/static/app.css?v=5">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/chart.umd.js"></script>
</head>
<body>
  <nav class="topnav">
    <span class="brand">📒 Ledger</span>
    <a href="/">Dashboard</a>
    <a href="/history">History</a>
    <a href="/recurring">Recurring</a>
    <a href="/categories">Categories</a>
    <a href="/import">Import</a>
    <button id="theme-toggle" class="icon-btn theme-toggle" title="Toggle dark mode">🌙</button>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js?v=5"></script>
</body>
</html>
